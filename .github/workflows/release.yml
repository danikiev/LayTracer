name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  validate-tag:
    needs: docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate strict semver tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag '$TAG'. Expected strict semver format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Ensure tag points to main history
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          git fetch origin main --depth=1
          TAG_COMMIT="$(git rev-list -n 1 "$TAG")"
          if [[ -z "$TAG_COMMIT" ]]; then
            echo "Unable to resolve commit for tag '$TAG'"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "Tag '$TAG' does not point to a commit contained in main"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: [docs, validate-tag]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish-testpypi
    environment: pypi

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
