name: Docs

on:
  push:
    branches: ["main", "dev"]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for PDF build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            latexmk \
            texlive-luatex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-pictures \
            fonts-freefont-otf

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Build HTML and PDF docs
        run: |
          make -C docs cleanall
          make -C docs html
          make -C docs latexpdf
          cp docs/build/latex/laytracer.pdf docs/build/html/_static/laytracer.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: laytracer-docs-pdf
          path: docs/build/latex/laytracer.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4